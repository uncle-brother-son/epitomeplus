#:schema node_modules/@opennextjs/cloudflare/wrangler-schema.json
name = "epitomeplus"
compatibility_date = "2026-03-06"
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]
workers_dev = true
preview_urls = false

# Cloudflare Workers deployment
main = "./.open-next/worker.js"

# Static assets binding (CRITICAL for CSS/JS/fonts)
[assets]
directory = "./.open-next/assets"
binding = "ASSETS"

# KV namespace for page cache
[[kv_namespaces]]
binding = "NEXT_INC_CACHE_KV"
id = "8211784f76ac4f7da7ed25078a5bcae7"

# D1 database for revalidation tags
[[d1_databases]]
binding = "NEXT_TAG_CACHE_D1"
database_name = "epitomeplus-tag-cache"
database_id = "5cfede1e-cc13-417c-850a-e0007dc8264a"

# Worker self-reference service
[[services]]
binding = "WORKER_SELF_REFERENCE"
service = "epitomeplus"
